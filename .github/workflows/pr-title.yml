name: pr-title

# With squash-merge enabled, the PR title becomes the commit subject on
# main — which is what release-please reads to decide version bumps.
# This check gates PRs whose title doesn't match Conventional Commits.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            build
            ci
            perf
            refactor
            revert
            style
            test
          requireScope: false
          # Lowercase start OR an all-caps acronym run of 2+ letters
          # (HTTP, API, CLI, JSON, YAML, RFC, …). Still rejects
          # sentence-case ("Do something") and trailing periods.
          subjectPattern: ^([a-z]|[A-Z]{2,}).+[^.]$
          subjectPatternError: |
            Subject must start with a lowercase letter or an all-caps acronym (e.g. HTTP, API, CLI), and must not end with a period.
            Got: "{subject}"

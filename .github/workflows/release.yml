name: release

# Two-stage flow driven by release-please:
#
# 1. Every push to main runs the `release-please` job. It scans commits
#    since the last release and either opens a "release" PR (bumping
#    package.json + appending to CHANGELOG.md) or updates the existing
#    one. No release is created until you merge that PR.
#
# 2. When the release PR is merged, release-please creates a GitHub
#    Release + git tag, sets `release_created: true` in outputs, and
#    the `publish` job runs: installs, builds, and publishes the
#    tagged commit to npm.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    # Fires only when release-please merges a release PR (tag + GitHub
    # Release just created). Regular pushes to main still trigger the
    # release-please job above, but it exits without `release_created`
    # when all it did was update the in-flight release PR.
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      # Publish every non-private workspace package. Currently that's
      # @aahoughton/oav-core (root) and @aahoughton/oav (packages/oav);
      # the @oav/* workspace packages are private and are skipped.
      #
      # --no-git-checks: the release-please commit is on main but CI
      # checks it out in detached-HEAD mode, which pnpm otherwise refuses.
      # --access public: required the first time a scoped package publishes;
      # harmless afterwards.
      # --provenance: attaches a signed build attestation (uses the
      # id-token: write OIDC permission above) so npmjs shows a
      # "verified" badge on the published tarball.
      - run: pnpm -r publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

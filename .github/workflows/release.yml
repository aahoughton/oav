name: release

# Two-stage flow driven by release-please:
#
# 1. Every push to main runs the `release-please` job. It scans commits
#    since the last release and either opens a "release" PR (bumping
#    package.json + appending to CHANGELOG.md) or updates the existing
#    one. No release is created until you merge that PR.
#
# 2. When the release PR is merged, release-please creates a GitHub
#    Release + git tag, sets `release_created: true` in outputs, and
#    the `publish` job runs: installs, builds, and publishes the
#    tagged commit to npm.

on:
  push:
    branches: [main]
  # Manual trigger: re-fires the publish job for the most recent
  # release tag without needing release-please to mint a new one.
  # Use this to recover from a transient publish failure (network,
  # registry hiccup, trusted-publisher misconfiguration on a single
  # package). `pnpm -r publish` is idempotent — it skips already-
  # published versions and only attempts the missing ones.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    # Fires when release-please merges a release PR (tag + GitHub
    # Release just created), OR when this workflow is manually
    # dispatched (recovery from a partial / failed publish).
    # Regular pushes to main run release-please above but skip
    # publish — release-please's `release_created` is `false` while
    # it's only updating the in-flight release PR.
    if: |
      needs.release-please.outputs.release_created == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          # Deliberately no `registry-url`. setup-node would otherwise
          # write a `.npmrc` containing
          # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` and
          # export `NODE_AUTH_TOKEN=XXXXX-XXXXX-XXXXX-XXXXX` (its
          # placeholder). pnpm/npm would then publish using that bogus
          # token instead of falling through to the OIDC trusted-
          # publisher exchange — which is exactly what we want it to do.
          # The default registry is registry.npmjs.org, so omitting this
          # parameter doesn't change where things publish.
      - run: pnpm install --frozen-lockfile
      # No explicit `pnpm build`: each package's prepack rebuilds on
      # `pnpm -r publish` below. (Vitest aliases the workspace src
      # directly, so `pnpm test` doesn't need a prebuilt dist either.)
      - run: pnpm test
      # Publish every non-private workspace package: @aahoughton/oav-core
      # (root), @aahoughton/oav (packages/oav), and the framework
      # adapters @aahoughton/oav-express4, oav-express5, oav-fastify.
      # The @oav/* internal workspace packages are private and skipped.
      #
      # Auth: npm trusted publishing via GitHub Actions OIDC. The
      # `id-token: write` permission above lets pnpm exchange a GitHub
      # OIDC token for an npm publish token at request time — no
      # NPM_TOKEN secret in this workflow. Each published package must
      # have a trusted publisher configured on npmjs.com pointing at
      # `aahoughton/oav` + this workflow file.
      #
      # --no-git-checks: the release-please commit is on main but CI
      # checks it out in detached-HEAD mode, which pnpm otherwise refuses.
      # --access public: required the first time a scoped package publishes;
      # harmless afterwards.
      # --provenance: attaches a signed build attestation so npmjs shows
      # a "verified" badge on the published tarball (also uses the OIDC
      # token).
      - run: pnpm -r publish --access public --provenance --no-git-checks

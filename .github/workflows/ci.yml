name: ci

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Nightly (08:30 UTC) run of the upstream JSON Schema Test Suite.
    - cron: "30 8 * * *"
  workflow_dispatch:

concurrency:
  # Cancel in-progress runs for the same ref when new commits land. Main
  # always runs to completion so release-please sees the final state.
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    # engines.node is ">=22"; exercise every supported major so we
    # catch version-specific regressions before consumers do.
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  framework-tests:
    # Real-server integration tests for the express4 / express5 / fastify
    # adapters. Lives in an isolated pnpm root (framework-tests/) so the
    # framework runtimes stay out of the main workspace's lockfile and
    # dependabot's main-directory scan. See issue #295.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      # Root install brings @types/express and fastify into
      # packages/oav-{express4,express5,fastify}/node_modules so tsc can
      # resolve the adapters' `import type { Request } from "express"` /
      # `from "fastify"` declarations when typechecking transitively from
      # framework-tests. The runtime express install lives only in
      # framework-tests/ (auto-install-peers=false in the root .npmrc
      # prevents the peer-dep declarations from pulling it back in).
      - run: pnpm install --frozen-lockfile
      - name: install framework-tests deps
        working-directory: framework-tests
        run: pnpm install --frozen-lockfile
      - name: typecheck
        working-directory: framework-tests
        run: pnpm typecheck
      - name: test
        working-directory: framework-tests
        run: pnpm test

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: install conformance deps
        working-directory: conformance
        run: pnpm install --frozen-lockfile
      - name: OpenAPI conformance cases
        working-directory: conformance
        run: pnpm tsx run-openapi-cases.ts
      - name: clone Overlay-Specification
        working-directory: conformance
        run: git clone --depth 1 https://github.com/OAI/Overlay-Specification.git
      - name: OpenAPI Overlay 1.0 suite
        working-directory: conformance
        run: pnpm tsx run-overlay-suite.ts --check-baseline
      - name: clone JSONTestSuite
        working-directory: conformance
        run: git clone --depth 1 https://github.com/nst/JSONTestSuite.git
      - name: JSON parser-conformance suite (stream-validator tokenizer)
        working-directory: conformance
        run: pnpm tsx run-json-parse-suite.ts --check-baseline

  json-schema-suite:
    # Full upstream JSON Schema Test Suite. Runs nightly and on
    # workflow_dispatch — not on every PR, because the suite is ~1300
    # cases and its clone is ~15 MB. Fails only when the current pass
    # count regresses below the committed baseline.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: install conformance deps
        working-directory: conformance
        run: pnpm install --frozen-lockfile
      - name: clone upstream suite
        working-directory: conformance
        run: git clone --depth 1 https://github.com/json-schema-org/JSON-Schema-Test-Suite.git
      - name: JSON Schema suite (required)
        working-directory: conformance
        run: pnpm tsx run-json-schema-suite.ts --check-baseline

  pack-smoke:
    # Catches `exports` map / `files` / bundler regressions that unit
    # tests don't surface. Packs both publish tarballs
    # (`@aahoughton/oav-core` + `@aahoughton/oav`), installs them into
    # fresh sandboxes, and imports each documented subpath.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # No explicit `pnpm build`: each publishable package's prepack
      # rebuilds on `pnpm pack` below, so the explicit step is wasted
      # work. Builds still happen — just via prepack.
      - name: pack every publishable workspace package
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/packed"
          pnpm pack --pack-destination "$GITHUB_WORKSPACE/packed"
          (cd packages/oav && pnpm pack --pack-destination "$GITHUB_WORKSPACE/packed")
          (cd packages/oav-express4 && pnpm pack --pack-destination "$GITHUB_WORKSPACE/packed")
          (cd packages/oav-express5 && pnpm pack --pack-destination "$GITHUB_WORKSPACE/packed")
          (cd packages/oav-fastify && pnpm pack --pack-destination "$GITHUB_WORKSPACE/packed")
          (cd packages/stream-validator && pnpm pack --pack-destination "$GITHUB_WORKSPACE/packed")
          ls -1 "$GITHUB_WORKSPACE/packed"
      - name: smoke-import @aahoughton/oav-core
        run: |
          set -euo pipefail
          CORE_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-core-*.tgz | head -n1)"
          rm -rf /tmp/smoke-core && mkdir -p /tmp/smoke-core && cd /tmp/smoke-core
          npm init -y > /dev/null
          npm install "$CORE_TGZ"
          cat > smoke.mjs <<'EOF'
          import { createValidator } from "@aahoughton/oav-core";
          import { compileSchema, jsonSchemaDialect } from "@aahoughton/oav-core/schema";
          import { createFileReader } from "@aahoughton/oav-core/spec";
          import { translateOverlay, applySpecOverlay } from "@aahoughton/oav-core/overlay-spec";
          const v = createValidator({
            openapi: "3.1.0",
            info: { title: "t", version: "1" },
            paths: {
              "/x": {
                post: {
                  requestBody: { required: true, content: { "application/json": { schema: { type: "object", required: ["a"] } } } },
                  responses: { "200": { description: "ok" } },
                },
              },
            },
          });
          const reqResult = v.validateRequest({ method: "POST", path: "/x", contentType: "application/json", body: {} });
          if (reqResult.valid) throw new Error("expected invalid (missing required 'a')");
          const { validate } = compileSchema({ type: "integer" }, { dialect: jsonSchemaDialect });
          if (!validate(42).valid) throw new Error("expected valid");
          // oav-core's JSON-only reader should refuse .yaml paths with an install-hint error.
          let threw = false;
          try {
            await createFileReader().read("dummy.yaml");
          } catch (e) {
            threw = /Install @aahoughton\/oav/.test(String(e?.message ?? ""));
          }
          if (!threw) throw new Error("expected oav-core's createFileReader to reject .yaml with an install hint");
          if (typeof translateOverlay !== "function") throw new Error("translateOverlay missing");
          if (typeof applySpecOverlay !== "function") throw new Error("applySpecOverlay missing");
          const overlay = translateOverlay({
            overlay: "1.0.0",
            info: { title: "t", version: "1" },
            actions: [{ target: "$.info", update: { description: "patched" } }],
          });
          if (!overlay.info || overlay.info.description !== "patched") {
            throw new Error("translateOverlay did not produce the expected info verb");
          }
          console.log("oav-core smoke ok");
          EOF
          node smoke.mjs
      - name: smoke-import @aahoughton/oav
        run: |
          set -euo pipefail
          CORE_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-core-*.tgz | head -n1)"
          SV_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-stream-validator-*.tgz | head -n1)"
          OAV_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-[0-9]*.tgz | head -n1)"
          rm -rf /tmp/smoke-oav && mkdir -p /tmp/smoke-oav && cd /tmp/smoke-oav
          npm init -y > /dev/null
          # Install all tarballs in one shot so `@aahoughton/oav`'s
          # dependencies on `@aahoughton/oav-core` and
          # `@aahoughton/oav-stream-validator` (the CLI's stream-check command)
          # resolve against the locally-packed artifacts, not the registry.
          npm install commander "$CORE_TGZ" "$SV_TGZ" "$OAV_TGZ"
          cat > smoke.mjs <<'EOF'
          import { createValidator, createYamlFileReader, parseYamlString } from "@aahoughton/oav";
          import { compileSchema, jsonSchemaDialect } from "@aahoughton/oav/schema";
          import { composeReaders, createFileReader } from "@aahoughton/oav/spec";
          import { translateOverlay, applySpecOverlay } from "@aahoughton/oav/overlay-spec";
          const v = createValidator({
            openapi: "3.1.0",
            info: { title: "t", version: "1" },
            paths: {
              "/x": {
                post: {
                  requestBody: { required: true, content: { "application/json": { schema: { type: "object", required: ["a"] } } } },
                  responses: { "200": { description: "ok" } },
                },
              },
            },
          });
          const reqResult = v.validateRequest({ method: "POST", path: "/x", contentType: "application/json", body: {} });
          if (reqResult.valid) throw new Error("expected invalid (missing required 'a')");
          const { validate } = compileSchema({ type: "integer" }, { dialect: jsonSchemaDialect });
          if (!validate(42).valid) throw new Error("expected valid");
          const parsed = parseYamlString("openapi: 3.1.0\ninfo: { title: t, version: '1' }\npaths: {}");
          if (parsed.openapi !== "3.1.0") throw new Error("parseYamlString regression");
          // composeReaders must accept the YAML reader from @aahoughton/oav
          // alongside oav-core's JSON readers.
          const reader = composeReaders([createYamlFileReader(), createFileReader()]);
          if (!reader.canRead("spec.yaml") || !reader.canRead("spec.json")) {
            throw new Error("composed reader should claim both .yaml and .json");
          }
          if (typeof translateOverlay !== "function") throw new Error("translateOverlay missing");
          if (typeof applySpecOverlay !== "function") throw new Error("applySpecOverlay missing");
          const overlay = translateOverlay({
            overlay: "1.0.0",
            info: { title: "t", version: "1" },
            actions: [{ target: "$.info", update: { description: "patched" } }],
          });
          if (!overlay.info || overlay.info.description !== "patched") {
            throw new Error("translateOverlay did not produce the expected info verb");
          }
          console.log("oav smoke ok");
          EOF
          node smoke.mjs
          # CLI should be present in bin; verify --help exits 0
          npx oav --help > /dev/null
          # Exercise stream-check: it imports analyzeSpec from
          # @aahoughton/oav-stream-validator, so this fails if that dependency
          # is missing or stale in the installed tree.
          cat > spec.json <<'JSON'
          {"openapi":"3.1.0","info":{"title":"t","version":"1"},"paths":{"/x":{"post":{"requestBody":{"content":{"application/json":{"schema":{"type":"object"}}}}}}}}
          JSON
          npx oav stream-check spec.json > /dev/null
      - name: smoke-import @aahoughton/oav-express4
        run: |
          set -euo pipefail
          CORE_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-core-*.tgz | head -n1)"
          E4_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-express4-*.tgz | head -n1)"
          rm -rf /tmp/smoke-e4 && mkdir -p /tmp/smoke-e4 && cd /tmp/smoke-e4
          npm init -y > /dev/null
          npm install express@4 "$CORE_TGZ" "$E4_TGZ"
          cat > smoke.mjs <<'EOF'
          import { createValidator } from "@aahoughton/oav-core";
          import {
            httpRequestFromExpress,
            renderProblemDetails,
            validateRequests,
          } from "@aahoughton/oav-express4";
          if (typeof validateRequests !== "function") throw new Error("validateRequests missing");
          if (typeof httpRequestFromExpress !== "function") throw new Error("httpRequestFromExpress missing");
          if (typeof renderProblemDetails !== "function") throw new Error("renderProblemDetails missing");
          // Exercise the cross-package boundary: build a validator from the
          // published core and hand it to the published adapter. This forces
          // the adapter's rewritten `@aahoughton/oav-core/core` imports to
          // load and proves a published-core validator is consumable. A leaked
          // `@oav/*` import would fail resolution here.
          const handler = validateRequests(
            createValidator({
              openapi: "3.1.0",
              info: { title: "t", version: "1" },
              paths: { "/x": { post: { responses: { "200": { description: "ok" } } } } },
            }),
          );
          if (typeof handler !== "function") throw new Error("validateRequests did not return a handler");
          console.log("oav-express4 smoke ok");
          EOF
          node smoke.mjs
      - name: smoke-import @aahoughton/oav-express5
        run: |
          set -euo pipefail
          CORE_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-core-*.tgz | head -n1)"
          E5_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-express5-*.tgz | head -n1)"
          rm -rf /tmp/smoke-e5 && mkdir -p /tmp/smoke-e5 && cd /tmp/smoke-e5
          npm init -y > /dev/null
          npm install express@5 "$CORE_TGZ" "$E5_TGZ"
          cat > smoke.mjs <<'EOF'
          import { createValidator } from "@aahoughton/oav-core";
          import {
            httpRequestFromExpress,
            renderProblemDetails,
            validateRequests,
          } from "@aahoughton/oav-express5";
          if (typeof validateRequests !== "function") throw new Error("validateRequests missing");
          if (typeof httpRequestFromExpress !== "function") throw new Error("httpRequestFromExpress missing");
          if (typeof renderProblemDetails !== "function") throw new Error("renderProblemDetails missing");
          // Exercise the cross-package boundary: build a validator from the
          // published core and hand it to the published adapter. This forces
          // the adapter's rewritten `@aahoughton/oav-core/core` imports to
          // load and proves a published-core validator is consumable. A leaked
          // `@oav/*` import would fail resolution here.
          const handler = validateRequests(
            createValidator({
              openapi: "3.1.0",
              info: { title: "t", version: "1" },
              paths: { "/x": { post: { responses: { "200": { description: "ok" } } } } },
            }),
          );
          if (typeof handler !== "function") throw new Error("validateRequests did not return a handler");
          console.log("oav-express5 smoke ok");
          EOF
          node smoke.mjs
      - name: smoke-import @aahoughton/oav-fastify
        run: |
          set -euo pipefail
          CORE_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-core-*.tgz | head -n1)"
          F_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-fastify-*.tgz | head -n1)"
          rm -rf /tmp/smoke-fastify && mkdir -p /tmp/smoke-fastify && cd /tmp/smoke-fastify
          npm init -y > /dev/null
          npm install fastify@5 "$CORE_TGZ" "$F_TGZ"
          cat > smoke.mjs <<'EOF'
          import { createValidator } from "@aahoughton/oav-core";
          import {
            httpRequestFromFastify,
            renderProblemDetails,
            validateRequests,
          } from "@aahoughton/oav-fastify";
          if (typeof validateRequests !== "function") throw new Error("validateRequests missing");
          if (typeof httpRequestFromFastify !== "function") throw new Error("httpRequestFromFastify missing");
          if (typeof renderProblemDetails !== "function") throw new Error("renderProblemDetails missing");
          // Exercise the cross-package boundary: build a validator from the
          // published core and hand it to the published adapter. This forces
          // the adapter's rewritten `@aahoughton/oav-core/core` imports to
          // load and proves a published-core validator is consumable. A leaked
          // `@oav/*` import would fail resolution here.
          const hook = validateRequests(
            createValidator({
              openapi: "3.1.0",
              info: { title: "t", version: "1" },
              paths: { "/x": { post: { responses: { "200": { description: "ok" } } } } },
            }),
          );
          if (typeof hook !== "function") throw new Error("validateRequests did not return a hook");
          console.log("oav-fastify smoke ok");
          EOF
          node smoke.mjs
      - name: smoke-import @aahoughton/oav-stream-validator
        run: |
          set -euo pipefail
          CORE_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-core-*.tgz | head -n1)"
          SV_TGZ="$(ls "$GITHUB_WORKSPACE/packed"/aahoughton-oav-stream-validator-*.tgz | head -n1)"
          rm -rf /tmp/smoke-sv && mkdir -p /tmp/smoke-sv && cd /tmp/smoke-sv
          npm init -y > /dev/null
          # Install both tarballs together so the stream validator's
          # dependency on @aahoughton/oav-core resolves against the locally
          # packed core, not the registry.
          npm install "$CORE_TGZ" "$SV_TGZ"
          cat > smoke.mjs <<'EOF'
          import { pipeline } from "node:stream/promises";
          import { Readable } from "node:stream";
          import { createStreamValidator } from "@aahoughton/oav-stream-validator";
          // Exercise the cross-package boundary: the engine delegates BUFFER
          // islands and dialect handling to the published core, so this proves
          // the rewritten `@aahoughton/oav-core/{core,schema,schema/internals}`
          // imports load. A leaked `@oav/*` import would fail resolution here.
          const validator = createStreamValidator({
            type: "object",
            required: ["a"],
            properties: { a: { type: "integer" } },
          });
          await pipeline(
            Readable.from([Buffer.from('{"a":1}')]),
            validator,
            async function (source) {
              for await (const _chunk of source) {
                // drain the echoed bytes so the transform can finish
              }
            },
          );
          const verdict = await validator.result;
          if (!verdict.valid) throw new Error("expected a valid verdict");
          console.log("oav-stream-validator smoke ok");
          EOF
          node smoke.mjs

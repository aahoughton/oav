version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # TypeScript majors cross every file in the tree at once and
      # routinely land breaking type-narrowing changes. Opt out of
      # auto-PRs; bump it deliberately when the time is right.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # The express runtime no longer appears in the main workspace
      # lockfile (it lives in framework-tests/), but @types/express
      # still does, in two sibling packages pinned to different
      # majors (oav-express4 -> 4.x, oav-express5 -> 5.x). Dependabot
      # has a workspace-wide version-unification step that picks one
      # target version for any given dep name and rewrites every
      # package.json that names it; that step would rewrite both
      # @types/express pins to the same major and silently break one
      # adapter (#276, #283). Until dependabot supports per-package
      # version scoping, ignore @types/express here and bump it by
      # hand when an in-major patch lands upstream.
      - dependency-name: "@types/express"
    groups:
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          # Keep @types/express out of the group: per-package grouping
          # converges to one workspace-wide version, which would pin the
          # oav-express4 and oav-express5 adapters to the same @types/express
          # major and break one of them.
          - "@types/express"
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
        exclude-patterns:
          # See note above.
          - "@types/express"

  - package-ecosystem: npm
    directory: "/performance"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # performance/ has no CI job (not type-checked or run), so a major
      # bump of a benchmark dep (ajv, tinybench, ref-parser, tsx) lands
      # unverified and could silently break or skew the benchmarks. Opt
      # out of major auto-PRs entirely; minor/patch still flow. Bump a
      # major by hand when revisiting the benchmark. Subsumes the
      # TypeScript-major opt-out used elsewhere.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  # performance/mem-bench is its own isolated pnpm root (own
  # pnpm-lock.yaml), nested under performance/ but not part of its
  # install. Dependabot scans each declared directory's lockfile
  # independently and does not recurse, so the nested root needs its
  # own entry or its advisories never get auto-PRs.
  - package-ecosystem: npm
    directory: "/performance/mem-bench"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # Like performance/ above, mem-bench has no CI job, so a major bump
      # lands unverified. It also deliberately benchmarks the eov server on
      # Express 4 (server-eov.mjs, express ^4 + express-openapi-validator):
      # a 4 -> 5 major would silently change what the benchmark measures.
      # Opt out of major auto-PRs entirely; minor/patch still flow. Bump a
      # major by hand when revisiting the benchmark.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/conformance"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # TypeScript majors cross every file in the tree at once and
      # routinely land breaking type-narrowing changes. Opt out of
      # auto-PRs; bump it deliberately when the time is right.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/framework-tests"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # TypeScript majors cross every file in the tree at once and
      # routinely land breaking type-narrowing changes. Opt out of
      # auto-PRs; bump it deliberately when the time is right.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # express-4 / express-5 are npm aliases for express@4 / express@5
      # respectively (this directory installs both majors side-by-side
      # so a single test run exercises both adapters). Dependabot does
      # not treat the two aliases as the same dependency, so they are
      # safe from the workspace-wide version-unification that motivates
      # the @types/express ignore in the root directory above. We still
      # bump these by hand alongside their @types/* siblings to keep
      # each major's pair consistent.
      - dependency-name: "express-4"
      - dependency-name: "express-5"
      - dependency-name: "@types/express-4"
      - dependency-name: "@types/express-5"
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "express-4"
          - "express-5"
          - "@types/express-4"
          - "@types/express-5"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions:
        patterns:
          - "*"

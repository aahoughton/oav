version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # TypeScript majors cross every file in the tree at once and
      # routinely land breaking type-narrowing changes. Opt out of
      # auto-PRs; bump it deliberately when the time is right.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      types:
        patterns:
          - "@types/*"
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/performance"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # TypeScript majors cross every file in the tree at once and
      # routinely land breaking type-narrowing changes. Opt out of
      # auto-PRs; bump it deliberately when the time is right.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/conformance"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # TypeScript majors cross every file in the tree at once and
      # routinely land breaking type-narrowing changes. Opt out of
      # auto-PRs; bump it deliberately when the time is right.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions:
        patterns:
          - "*"

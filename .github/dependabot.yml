version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # TypeScript majors cross every file in the tree at once and
      # routinely land breaking type-narrowing changes. Opt out of
      # auto-PRs; bump it deliberately when the time is right.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Each oav-express{4,5} adapter pins to its corresponding express
      # major on purpose — that's the whole point of having two
      # packages. A semver-major bump here would silently turn the v4
      # adapter into a v5 adapter (or vice versa). Within-major patch /
      # minor bumps still flow through dev-minor-and-patch.
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/express"
        update-types: ["version-update:semver-major"]
    groups:
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          # Keep @types/express out of the group: per-package grouping
          # converges to one workspace-wide version, which would pin the
          # oav-express4 and oav-express5 adapters to the same @types/express
          # major and break one of them.
          - "@types/express"
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
        exclude-patterns:
          # See note above. The major-version ignore on `express` doesn't
          # fire when grouping presents the change as a patch (oav-express5
          # silently gets rewritten from 5.x to a 4.x patch), so keep both
          # out of the group entirely.
          - "express"
          - "@types/express"

  - package-ecosystem: npm
    directory: "/performance"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # TypeScript majors cross every file in the tree at once and
      # routinely land breaking type-narrowing changes. Opt out of
      # auto-PRs; bump it deliberately when the time is right.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/conformance"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      # TypeScript majors cross every file in the tree at once and
      # routinely land breaking type-narrowing changes. Opt out of
      # auto-PRs; bump it deliberately when the time is right.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions:
        patterns:
          - "*"

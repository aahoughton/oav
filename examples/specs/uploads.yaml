openapi: "3.1.0"
info:
  title: Uploads
  version: "1"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
paths:
  /uploads:
    post:
      operationId: uploadDocument
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  maxLength: 10485760
      responses:
        "201":
          description: created
